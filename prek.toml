[[repos]]
repo = "https://github.com/biomejs/pre-commit"
rev = "v2.4.11"
hooks = [
  {id = "biome-check"}
]

[[repos]]
repo = "https://github.com/editorconfig-checker/editorconfig-checker"
rev = "v3.6.1"
hooks = [
  {id = "editorconfig-checker"}
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "node-test"
name = "node --test"
entry = "bash -c 'node --test js/*.test.js'"
language = "system"
files = "^js/.*\\.js$"
pass_filenames = false
